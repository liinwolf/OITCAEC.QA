<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題管理系統 V.1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f2f7;
  --border:#e2e6ef;--accent:#4f8ef7;--accent2:#f7914f;
  --success:#2da563;--warn:#d4900a;--danger:#d94040;
  --text:#1a1f2e;--text-muted:#6b7897;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

/* ══ AUTH SCREEN ══ */
#authScreen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;}

.auth-wrap{width:440px;animation:slideUp .45s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.auth-logo{font-family:'Noto Sans TC',sans-serif;font-size:1.1rem;color:var(--accent);letter-spacing:1px;margin-bottom:6px;font-weight:700;}
.auth-sub{color:var(--text-muted);font-size:.8rem;margin-bottom:28px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:0 4px 24px rgba(0,0,0,.07);}
.auth-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:22px;}
.auth-tab{flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:var(--accent);color:#fff;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.73rem;color:var(--text-muted);margin-bottom:5px;letter-spacing:.4px;}
input[type=text],input[type=password],input[type=email],select,textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:10px 12px;
  font-size:.875rem;font-family:'Noto Sans TC',sans-serif;transition:border .2s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
select option{background:var(--surface);}
textarea{resize:vertical;min-height:80px;}
.btn-auth{
  width:100%;padding:11px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:.875rem;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:opacity .2s;margin-top:4px;
}
.btn-auth:hover{opacity:.85;}
.auth-err{color:var(--danger);font-size:.75rem;margin-top:6px;min-height:16px;}
.auth-hint{margin-top:18px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.auth-hint p{font-size:.68rem;color:var(--text-muted);margin-bottom:6px;font-family:'Space Mono',monospace;letter-spacing:.5px;}
.hint-chip{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
  border-radius:5px;border:1px solid var(--border);font-size:.7rem;
  cursor:pointer;margin:2px;background:var(--surface);transition:all .15s;color:var(--text-muted);
}
.hint-chip:hover{border-color:var(--accent);color:var(--accent);}

/* ══ HEADER ══ */
header{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:54px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.logo{font-family:'Noto Sans TC',sans-serif;font-size:.82rem;color:var(--accent);letter-spacing:1px;font-weight:700;}
.nav-tabs{display:flex;gap:3px;}
.nav-tab{padding:5px 15px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
.nav-tab:hover{color:var(--text);background:var(--surface2);}
.nav-tab.active{background:var(--accent);color:#fff;}
.header-right{display:flex;align-items:center;gap:8px;}
.notif-btn{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;transition:all .2s;color:var(--text-muted);font-size:.95rem;}
.notif-btn:hover{border-color:var(--accent);color:var(--accent);}
.notif-badge{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:.58rem;font-family:'Space Mono',monospace;padding:1px 4px;border-radius:10px;min-width:16px;text-align:center;display:none;}
.notif-badge.show{display:block;}
.user-pill{display:flex;align-items:center;gap:7px;padding:3px 10px 3px 5px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-size:.78rem;}
.avatar-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;}
.av-admin{background:rgba(79,142,247,.18);color:var(--accent);}
.av-subadmin{background:rgba(247,145,79,.18);color:var(--accent2);}
.av-user{background:rgba(45,165,99,.18);color:var(--success);}
.btn-sm{padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.72rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.btn-sm:hover{border-color:var(--danger);color:var(--danger);}

/* ══ LAYOUT ══ */
.layout{display:grid;grid-template-columns:248px 1fr 316px 200px;height:calc(100vh - 54px);overflow:hidden;}

/* ══ SIDEBAR ══ */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-title{font-size:.68rem;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:1px;}
.btn-new{padding:4px 11px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:.72rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
.btn-new:hover{opacity:.85;}
.filter-bar{padding:7px 10px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;}
.filter-chip{padding:2px 8px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.68rem;cursor:pointer;transition:all .15s;}
.filter-chip:hover,.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.08);}
.ticket-list{overflow-y:auto;flex:1;padding:5px;display:flex;flex-direction:column;gap:3px;}
.ticket-item{padding:10px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:all .15s;}
.ticket-item:hover{background:var(--surface2);border-color:var(--border);}
.ticket-item.active{background:#eef3fe;border-color:var(--accent);}
.ticket-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ticket-id{font-family:'Space Mono',monospace;font-size:.63rem;color:var(--text-muted);}
.status-dot{width:7px;height:7px;border-radius:50%;}
.s-open{background:var(--warn);}.s-inprogress{background:var(--accent);}.s-resolved{background:var(--success);}.s-closed{background:var(--text-muted);}
.ticket-subject{font-size:.8rem;font-weight:500;margin-bottom:3px;line-height:1.3;}
.ticket-info{font-size:.65rem;color:var(--text-muted);display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.tag{padding:1px 5px;border-radius:3px;font-size:.62rem;background:var(--surface2);border:1px solid var(--border);}

/* ══ DUTY OFFICER PANEL ══ */
.duty-panel{
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.duty-header{
  padding:13px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.duty-title{font-size:.68rem;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:1px;}
.duty-date{font-size:.62rem;font-family:'Space Mono',monospace;color:var(--accent);margin-top:1px;}
.duty-schedule-btn{
  background:none;border:1px solid var(--border);border-radius:6px;
  padding:4px 8px;cursor:pointer;font-size:.8rem;transition:all .2s;color:var(--text-muted);
}
.duty-schedule-btn:hover{border-color:var(--accent);color:var(--accent);}
.duty-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:18px 14px 14px;gap:0;overflow-y:auto;}
.duty-photo-wrap{
  width:108px;height:108px;border-radius:50%;overflow:hidden;
  border:3px solid var(--border);position:relative;
  background:var(--surface2);flex-shrink:0;transition:border-color .2s;
}
.duty-photo-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  color:var(--text-muted);font-size:.68rem;text-align:center;
}
.duty-photo-placeholder span{font-size:1.6rem;}
.duty-name-wrap{width:100%;margin-top:12px;}
.duty-name-label{font-size:.62rem;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:.8px;margin-bottom:4px;text-align:center;}
.duty-name-display{
  font-size:.95rem;font-weight:700;text-align:center;color:var(--text);
  padding:5px 0;letter-spacing:.5px;
}
.duty-name-display.placeholder{color:var(--text-muted);font-weight:400;font-size:.82rem;}

/* Week preview strip */
.duty-week-preview{
  width:100%;margin-top:16px;display:flex;flex-direction:column;gap:5px;
}
.duty-week-row{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  transition:all .15s;
}
.duty-week-row.today{
  border-color:var(--accent);background:rgba(79,142,247,.07);
}
.duty-week-day{
  font-size:.68rem;font-family:'Space Mono',monospace;
  color:var(--text-muted);width:28px;flex-shrink:0;
}
.duty-week-row.today .duty-week-day{color:var(--accent);font-weight:700;}
.duty-week-avatar{
  width:26px;height:26px;border-radius:50%;overflow:hidden;
  flex-shrink:0;background:var(--border);display:flex;align-items:center;justify-content:center;
  font-size:.65rem;color:var(--text-muted);
}
.duty-week-avatar img{width:100%;height:100%;object-fit:cover;}
.duty-week-name{font-size:.76rem;font-weight:500;flex:1;color:var(--text);}
.duty-week-name.empty{color:var(--text-muted);font-weight:400;font-size:.7rem;}
.duty-week-row.today .duty-week-name{color:var(--accent);font-weight:700;}
.duty-schedule-btn-full{
  margin-top:14px;width:100%;padding:7px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);font-size:.73rem;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.duty-schedule-btn-full:hover{border-color:var(--accent);color:var(--accent);}

/* Schedule modal rows */
.schedule-row{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--border);
}
.schedule-row:last-child{border-bottom:none;}
.schedule-day-label{
  font-size:.75rem;font-family:'Space Mono',monospace;
  color:var(--text-muted);width:36px;flex-shrink:0;
}
.schedule-photo-btn{
  width:44px;height:44px;border-radius:50%;border:2px dashed var(--border);
  background:var(--surface2);cursor:pointer;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:var(--text-muted);flex-shrink:0;transition:border-color .2s;
  position:relative;
}
.schedule-photo-btn:hover{border-color:var(--accent);}
.schedule-photo-btn img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%;}
.schedule-name-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;color:var(--text);padding:8px 10px;
  font-size:.82rem;font-family:'Noto Sans TC',sans-serif;transition:border .2s;
}
.schedule-name-input:focus{outline:none;border-color:var(--accent);}
.schedule-clear-btn{
  padding:5px 8px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);font-size:.7rem;cursor:pointer;
  transition:all .2s;flex-shrink:0;
}
.schedule-clear-btn:hover{border-color:var(--danger);color:var(--danger);}

/* ══ MAIN ══ */
.main{overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:16px;background:var(--bg);}
.main-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.ticket-title{font-size:1.1rem;font-weight:700;line-height:1.3;}
.ticket-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.badge{padding:2px 8px;border-radius:20px;font-size:.65rem;border:1px solid;font-family:'Space Mono',monospace;}
.badge-open{color:var(--warn);border-color:var(--warn);background:rgba(212,144,10,.08);}
.badge-inprogress{color:var(--accent);border-color:var(--accent);background:rgba(79,142,247,.08);}
.badge-resolved{color:var(--success);border-color:var(--success);background:rgba(45,165,99,.08);}
.badge-closed{color:var(--text-muted);border-color:var(--text-muted);}
.badge-priority-high{color:var(--danger);border-color:var(--danger);background:rgba(217,64,64,.08);}
.badge-priority-mid{color:var(--accent2);border-color:var(--accent2);background:rgba(247,145,79,.08);}
.badge-priority-low{color:var(--text-muted);border-color:var(--border);}
.action-btns{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;}
.btn{padding:5px 13px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.75rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.85;color:#fff;}
.btn-success{background:var(--success);border-color:var(--success);color:#fff;}
.btn-success:hover{opacity:.85;color:#fff;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-danger:hover{opacity:.85;color:#fff;}
.divider{height:1px;background:var(--border);}
.desc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.desc-card h4{font-size:.65rem;font-family:'Space Mono',monospace;color:var(--text-muted);margin-bottom:8px;letter-spacing:1px;}
.desc-card p{font-size:.855rem;line-height:1.7;}
.replies-section h4{font-size:.65rem;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:1px;margin-bottom:10px;}
.reply-list{display:flex;flex-direction:column;gap:9px;}
.reply-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;animation:fadeIn .25s ease;}
.reply-card.admin-reply{border-left:3px solid var(--accent);}
.reply-card.subadmin-reply{border-left:3px solid var(--accent2);}
.reply-card.user-reply{border-left:3px solid var(--success);}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.reply-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.reply-author{font-size:.76rem;font-weight:700;display:flex;align-items:center;gap:5px;}
.author-role{font-size:.6rem;padding:1px 5px;border-radius:3px;font-family:'Space Mono',monospace;}
.role-admin{background:rgba(79,142,247,.12);color:var(--accent);}
.role-subadmin{background:rgba(247,145,79,.12);color:var(--accent2);}
.role-user{background:rgba(45,165,99,.12);color:var(--success);}
.reply-time{font-size:.64rem;color:var(--text-muted);font-family:'Space Mono',monospace;}
.reply-body{font-size:.83rem;line-height:1.65;}
.reply-input-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.reply-input-area h4{font-size:.65rem;font-family:'Space Mono',monospace;color:var(--text-muted);margin-bottom:8px;letter-spacing:1px;}
.reply-actions{display:flex;justify-content:flex-end;margin-top:7px;gap:6px;}

/* ══ RIGHT PANEL ══ */
.panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
.panel-section h4{font-size:.65rem;font-family:'Space Mono',monospace;color:var(--text-muted);letter-spacing:1px;margin-bottom:9px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:.74rem;color:var(--text-muted);}
.info-value{font-size:.76rem;font-weight:500;}
.assignee-box{background:var(--surface2);border-radius:8px;padding:10px;display:flex;align-items:center;gap:9px;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;}
.avatar-a{background:rgba(79,142,247,.18);color:var(--accent);}
.avatar-sa{background:rgba(247,145,79,.18);color:var(--accent2);}
.avatar-u{background:rgba(45,165,99,.18);color:var(--success);}
.assignee-info{font-size:.78rem;}
.assignee-info small{display:block;font-size:.65rem;color:var(--text-muted);}
.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:8px;padding-bottom:11px;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:6px;top:16px;bottom:0;width:1px;background:var(--border);}
.tl-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:2px solid var(--surface);margin-top:2px;}
.tl-text{font-size:.75rem;line-height:1.35;}
.tl-time{font-size:.62rem;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:1px;}

/* ══ NOTIFICATION PANEL ══ */
.notif-panel{
  position:fixed;top:54px;right:14px;width:320px;z-index:300;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.12);overflow:hidden;
  transform:translateY(-8px) scale(.97);opacity:0;pointer-events:none;transition:all .18s;
}
.notif-panel.open{transform:none;opacity:1;pointer-events:all;}
.notif-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.notif-header span{font-size:.78rem;font-weight:700;}
.notif-clear{font-size:.68rem;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Noto Sans TC',sans-serif;}
.notif-list{max-height:340px;overflow-y:auto;}
.notif-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;gap:9px;align-items:flex-start;}
.notif-item:hover{background:var(--surface2);}
.notif-item.unread{background:rgba(79,142,247,.05);}
.notif-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.notif-body{flex:1;}
.notif-title{font-size:.77rem;font-weight:500;margin-bottom:2px;}
.notif-desc{font-size:.7rem;color:var(--text-muted);line-height:1.4;}
.notif-time{font-size:.62rem;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:2px;}
.notif-unread-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.notif-empty{padding:28px;text-align:center;color:var(--text-muted);font-size:.8rem;}

/* ══ MODALS ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:500px;max-width:95vw;padding:24px;transform:translateY(18px);transition:transform .2s;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14);}
.overlay.open .modal{transform:none;}
.modal-title{font-size:.9rem;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;}

/* ══ USER TABLE ══ */
.user-table{width:100%;border-collapse:collapse;}
.user-table th,.user-table td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--border);font-size:.78rem;}
.user-table th{color:var(--text-muted);font-weight:400;font-family:'Space Mono',monospace;font-size:.65rem;}
.role-tag{padding:2px 7px;border-radius:4px;font-size:.65rem;font-family:'Space Mono',monospace;}
.rt-admin{background:rgba(79,142,247,.12);color:var(--accent);}
.rt-subadmin{background:rgba(247,145,79,.12);color:var(--accent2);}
.rt-user{background:rgba(45,165,99,.12);color:var(--success);}

/* ══ MISC ══ */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:var(--text-muted);text-align:center;}
.empty-icon{font-size:2rem;}
.empty-state p{font-size:.8rem;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:.8rem;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(16px);opacity:0;pointer-events:none;transition:all .22s;}
.toast.show{transform:none;opacity:1;}
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-logo">問題管理系統</div>
    <div class="auth-sub">Issue Management System &nbsp;V.1.0</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">登入</button>
        <button class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">註冊帳號</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="formLogin">
        <div class="form-group"><label>帳號</label><input type="text" id="loginUser" placeholder="輸入帳號..."></div>
        <div class="form-group"><label>密碼</label><input type="password" id="loginPass" placeholder="輸入密碼..."></div>
        <div class="auth-err" id="loginErr"></div>
        <button class="btn-auth" onclick="doLogin()">登入</button>
        <!-- 僅首次（未初始化）顯示 Demo 提示 -->
        <div class="auth-hint" id="demoHint" style="display:none">
          <p>⚠️ 首次使用 — 預設帳號：</p>
          <span class="hint-chip" onclick="quickLogin('admin','admin123')">🔑 admin / admin123</span>
          <p style="margin-top:8px;font-size:.65rem;color:var(--danger)">請登入後至帳號管理修改預設密碼</p>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="formRegister" style="display:none">
        <div class="form-group"><label>帳號 *（登入用，不可重複）</label><input type="text" id="regUser" placeholder="設定帳號..."></div>
        <div class="form-group"><label>顯示名稱 *</label><input type="text" id="regName" placeholder="您的顯示名稱..."></div>
        <div class="form-group"><label>密碼 *</label><input type="password" id="regPass" placeholder="設定密碼（至少4位）..."></div>
        <div class="form-group"><label>確認密碼 *</label><input type="password" id="regPass2" placeholder="再次輸入密碼..."></div>
        <div class="auth-err" id="regErr"></div>
        <button class="btn-auth" onclick="doRegister()">建立帳號</button>
        <p style="font-size:.72rem;color:var(--text-muted);margin-top:10px;text-align:center">新帳號預設為「使用者」角色，角色升級請聯繫管理員</p>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">
<header>
  <div class="logo">問題管理系統</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('tickets',this)">問題列表</button>
    <button class="nav-tab" onclick="switchView('dashboard',this)">統計看板</button>
    <button class="nav-tab" id="userMgmtTab" style="display:none" onclick="switchView('users',this)">帳號管理</button>
  </div>
  <div class="header-right">
    <div class="notif-btn" onclick="toggleNotif()" id="notifBtn">
      🔔<span class="notif-badge" id="notifBadge">0</span>
    </div>
    <div class="user-pill">
      <div class="avatar-sm" id="headerAvatar"></div>
      <span id="headerName"></span>
      <span id="headerRole" style="font-size:.6rem;color:var(--text-muted);font-family:'Space Mono',monospace"></span>
    </div>
    <button class="btn-sm" onclick="doLogout()">登出</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">TICKETS</span>
      <button class="btn-new" onclick="openModal('modalNewTicket')">+ 新增</button>
    </div>
    <div class="filter-bar">
      <button class="filter-chip active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-chip" onclick="setFilter('open',this)">待處理</button>
      <button class="filter-chip" onclick="setFilter('inprogress',this)">處理中</button>
      <button class="filter-chip" onclick="setFilter('resolved',this)">已解決</button>
    </div>
    <div class="ticket-list" id="ticketList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty-state"><div class="empty-icon">📋</div><p>請選擇問題或建立新問題</p></div>
  </div>
  <div class="panel" id="rightPanel">
    <div class="empty-state" style="height:100%"><div class="empty-icon">ℹ️</div><p>選擇問題以查看詳細資訊</p></div>
  </div>
  <!-- ══ DUTY OFFICER PANEL ══ -->
  <div class="duty-panel">
    <div class="duty-header">
      <div>
        <div class="duty-title">TODAY'S DUTY</div>
        <div class="duty-date" id="dutyDateStr"></div>
      </div>
      <button class="duty-schedule-btn" onclick="openScheduleModal()" title="設定週排班">⚙️</button>
    </div>
    <div class="duty-body">
      <!-- Today card -->
      <div class="duty-photo-wrap" id="dutyPhotoWrap">
        <img id="dutyPhoto" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%">
        <div class="duty-photo-placeholder" id="dutyPlaceholder">
          <span>👤</span>
          <div>尚未設定<br>今日值班</div>
        </div>
      </div>

      <div class="duty-name-wrap">
        <div class="duty-name-label">今日值日生</div>
        <div class="duty-name-display placeholder" id="dutyNameDisplay">—</div>
      </div>

      <!-- Week preview -->
      <div class="duty-week-preview" id="dutyWeekPreview"></div>

      <button class="duty-schedule-btn-full" onclick="openScheduleModal()">📅 設定週排班</button>
    </div>
  </div>
  <!-- Hidden file input for schedule modal -->
  <input type="file" id="dutyFileInput" accept="image/*" style="display:none" onchange="handleSchedulePhotoUpload(event)">
</div><!-- end layout -->


<!-- Notif Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <span>🔔 通知中心</span>
    <button class="notif-clear" onclick="clearNotifs()">全部已讀</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>
</div>

<!-- ══ MODALS ══ -->
<div class="overlay" id="modalNewTicket">
  <div class="modal">
    <div class="modal-title">✏️ 建立新問題</div>
    <div class="form-group"><label>問題主旨 *</label><input type="text" id="newSubject" placeholder="簡短描述問題..."></div>
    <div class="form-group"><label>問題分類</label>
      <select id="newCat"><option>功能操作</option><option>系統安裝</option><option>授權問題</option><option>功能測試</option><option>軟體應用</option><option>特殊問題</option><option>一般偵錯</option><option>其他</option></select>
    </div>
    <div class="form-group"><label>優先程度</label>
      <select id="newPri"><option value="low">低</option><option value="mid" selected>中</option><option value="high">高</option></select>
    </div>
    <div class="form-group"><label>問題描述 *</label><textarea id="newDesc" placeholder="詳細描述問題..."></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalNewTicket')">取消</button>
      <button class="btn btn-primary" onclick="submitTicket()">送出問題</button>
    </div>
  </div>
</div>

<!-- Edit Role Modal -->
<div class="overlay" id="modalEditRole">
  <div class="modal" style="width:360px">
    <div class="modal-title">⚙️ 修改角色</div>
    <div class="form-group">
      <label>帳號</label>
      <input type="text" id="editRoleUsername" disabled style="opacity:.6">
    </div>
    <div class="form-group">
      <label>新角色</label>
      <select id="editRoleValue">
        <option value="user">一般使用者</option>
        <option value="subadmin">副管理員</option>
        <option value="admin">主管理員</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalEditRole')">取消</button>
      <button class="btn btn-primary" onclick="confirmEditRole()">儲存</button>
    </div>
  </div>
</div>

<!-- Duty Schedule Modal -->
<div class="overlay" id="modalDutySchedule">
  <div class="modal" style="width:580px">
    <div class="modal-title">📅 設定週排班</div>
    <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:18px">為每個工作天設定值班人員姓名與照片，系統將於當天自動顯示。</p>
    <div id="scheduleRows"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalDutySchedule')">取消</button>
      <button class="btn btn-primary" onclick="saveSchedule()">儲存排班</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<script>
// ══ STORAGE HELPERS ══
const SEED_ACCOUNTS = [
  {id:'admin', name:'admin', role:'admin', pass:'admin123', avatar:'A'},
];

// 是否為首次進入（localStorage 完全沒有帳號資料）
const isFirstTime = !localStorage.getItem('hd_accounts');

function loadAccounts(){
  let list = [];
  try{
    const raw = localStorage.getItem('hd_accounts');
    if(raw) list = JSON.parse(raw);
    if(!Array.isArray(list)) list = [];
  }catch(e){ list = []; }

  // 確保 seed 帳號一定存在（僅補上不存在的，不覆蓋已修改的）
  let changed = false;
  for(const seed of SEED_ACCOUNTS){
    if(!list.find(a => a.id === seed.id)){
      list.push({...seed});
      changed = true;
    }
  }
  // 確保每個帳號都有必要欄位
  list = list.map(a => ({
    id: a.id || '',
    name: a.name || a.id,
    role: a.role || 'user',
    pass: a.pass || '',
    avatar: a.avatar || (a.name ? a.name[0] : '?'),
  }));
  if(changed) saveAccounts(list);
  return list;
}
function saveAccounts(a){ localStorage.setItem('hd_accounts', JSON.stringify(a)); }

// 顯示/隱藏 Demo 提示（僅首次）
function initDemoHint(){
  const hint = document.getElementById('demoHint');
  if(!hint) return;
  hint.style.display = isFirstTime ? 'block' : 'none';
}

// 標記已初始化（登入或註冊成功後呼叫，確保 hd_accounts 已寫入）
function markInitialized(){
  // hd_accounts 寫入即代表初始化完成，下次載入 isFirstTime 就是 false
  // 這裡只需確保帳號已存在（loadAccounts 已處理）
}

function loadTickets(){
  try{
    const raw=localStorage.getItem('hd_tickets');
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return [];
}
function saveTickets(t){ localStorage.setItem('hd_tickets',JSON.stringify(t)); }

function loadNotifs(){
  try{ const r=localStorage.getItem('hd_notifs'); if(r) return JSON.parse(r); }catch(e){}
  return [];
}
function saveNotifs(n){ localStorage.setItem('hd_notifs',JSON.stringify(n)); }

// ══ STATE ══
let accounts=loadAccounts();
let tickets=loadTickets();
let notifications=loadNotifs();
let currentUser=null;
let selectedId=null;
let currentFilter='all';
let editingRoleId=null;
let toastTimer;

// 頁面載入時初始化 Demo 提示顯示狀態
initDemoHint();

// ══ AUTH ══
function switchAuthTab(tab){
  document.getElementById('formLogin').style.display=tab==='login'?'':'none';
  document.getElementById('formRegister').style.display=tab==='register'?'':'none';
  document.getElementById('tabLogin').classList.toggle('active',tab==='login');
  document.getElementById('tabRegister').classList.toggle('active',tab==='register');
}

function quickLogin(u,p){
  document.getElementById('loginUser').value=u;
  document.getElementById('loginPass').value=p;
  doLogin();
}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(!u || !p){ document.getElementById('loginErr').textContent='請輸入帳號與密碼'; return; }
  const acc=accounts.find(a=>a.id===u&&a.pass===p);
  if(!acc){
    const exists = accounts.find(a=>a.id===u);
    document.getElementById('loginErr').textContent = exists ? '密碼錯誤' : '帳號不存在';
    return;
  }
  // 登入成功 → 隱藏 Demo 提示（之後重新載入也不再顯示）
  const hint = document.getElementById('demoHint');
  if(hint) hint.style.display = 'none';
  currentUser=acc;
  document.getElementById('loginErr').textContent='';
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}

function doRegister(){
  const u=document.getElementById('regUser').value.trim();
  const name=document.getElementById('regName').value.trim();
  const p=document.getElementById('regPass').value;
  const p2=document.getElementById('regPass2').value;
  const err=document.getElementById('regErr');
  if(!u||!name||!p){ err.textContent='請填寫所有欄位'; return; }
  if(p.length<4){ err.textContent='密碼至少需要 4 位'; return; }
  if(p!==p2){ err.textContent='兩次密碼不一致'; return; }
  if(accounts.find(a=>a.id===u)){ err.textContent='帳號已被使用'; return; }
  err.textContent='';
  const newAcc={id:u,name,role:'user',pass:p,avatar:name[0]};
  accounts.push(newAcc);
  saveAccounts(accounts);
  // auto login
  currentUser=newAcc;
  ['regUser','regName','regPass','regPass2'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
  showToast('✅',`歡迎，${name}！帳號已建立`);
}

function doLogout(){
  currentUser=null; selectedId=null;
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  switchAuthTab('login');
  document.querySelectorAll('.filter-chip').forEach((c,i)=>c.classList.toggle('active',i===0));
}

function initApp(){
  const av=document.getElementById('headerAvatar');
  av.textContent=currentUser.avatar;
  av.className='avatar-sm '+(currentUser.role==='admin'?'av-admin':currentUser.role==='subadmin'?'av-subadmin':'av-user');
  document.getElementById('headerName').textContent=currentUser.name;
  document.getElementById('headerRole').textContent=currentUser.role==='admin'?'[ADMIN]':currentUser.role==='subadmin'?'[SUB]':'[USER]';
  document.getElementById('userMgmtTab').style.display=isAdminRole()?'':'none';
  renderNotifs();
  renderTicketList();
  document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>請選擇問題或建立新問題</p></div>';
  document.getElementById('rightPanel').innerHTML='<div class="empty-state" style="height:100%"><div class="empty-icon">ℹ️</div><p>選擇問題以查看詳細資訊</p></div>';
  // set active nav
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
}

const isAdminRole=()=>currentUser&&(currentUser.role==='admin'||currentUser.role==='subadmin');
const getUser=id=>accounts.find(a=>a.id===id);

// ══ TICKET LIST ══
function visibleTickets(){
  let list=currentUser.role==='user'
    ?tickets.filter(t=>t.submitterId===currentUser.id)
    :tickets;
  if(currentFilter!=='all') list=list.filter(t=>t.status===currentFilter);
  return list;
}

function renderTicketList(){
  const list=document.getElementById('ticketList');
  const filtered=visibleTickets();
  if(!filtered.length){
    list.innerHTML='<div class="empty-state" style="padding:28px 0"><div class="empty-icon">🔍</div><p>沒有符合的問題</p></div>';
    return;
  }
  list.innerHTML=filtered.map(t=>`
    <div class="ticket-item ${selectedId===t.id?'active':''}" onclick="selectTicket('${t.id}')">
      <div class="ticket-meta"><span class="ticket-id">${t.id}</span><span class="status-dot s-${t.status}"></span></div>
      <div class="ticket-subject">${t.subject}</div>
      <div class="ticket-info">
        <span>${getUser(t.submitterId)?.name||'?'}</span>
        <span class="tag">${t.category}</span>
        <span class="tag">${priLabel(t.priority)}</span>
      </div>
    </div>`).join('');
}

function selectTicket(id){
  selectedId=id;
  const t=tickets.find(x=>x.id===id);
  renderTicketList();
  renderDetail(t);
  renderPanel(t);
}

// ══ DETAIL ══
function renderDetail(t){
  const adm=isAdminRole();
  const submitter=getUser(t.submitterId);
  const canDelete=adm||(currentUser.id===t.submitterId&&t.status==='open');
  document.getElementById('mainContent').innerHTML=`
    <div class="main-header">
      <div>
        <div class="ticket-title">${t.subject}</div>
        <div class="ticket-badges">
          <span class="badge ${statusBadge(t.status)}">${statusLabel(t.status)}</span>
          <span class="badge badge-priority-${t.priority}">${priLabel(t.priority)}</span>
          <span class="badge" style="color:var(--text-muted);border-color:var(--border)">${t.category}</span>
        </div>
      </div>
      <div class="action-btns">
        ${adm&&t.status==='open'?`<button class="btn btn-primary" onclick="acceptTicket('${t.id}')">✅ 接受任務</button>`:''}
        ${adm&&t.status==='inprogress'?`<button class="btn btn-success" onclick="resolveTicket('${t.id}')">🏁 標記解決</button>`:''}
        ${adm&&t.status!=='closed'?`<button class="btn" onclick="closeTicket('${t.id}')">關閉</button>`:''}
        ${canDelete?`<button class="btn btn-danger" onclick="deleteTicket('${t.id}')">🗑 刪除</button>`:''}
      </div>
    </div>
    <div class="divider"></div>
    <div class="desc-card">
      <h4>問題描述</h4>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        <div class="avatar avatar-u" style="width:28px;height:28px;font-size:.72rem;flex-shrink:0">${submitter?.avatar||'?'}</div>
        <div>
          <span style="font-size:.8rem;font-weight:600">${submitter?.name||'未知使用者'}</span>
          <span style="font-size:.7rem;color:var(--text-muted);margin-left:6px">${t.created}</span>
        </div>
      </div>
      <p>${t.desc}</p>
    </div>
    <div class="replies-section">
      <h4>回覆紀錄 (${t.replies.length})</h4>
      <div class="reply-list" id="replyList">
        ${t.replies.length?t.replies.map(r=>replyCard(r)).join(''):'<p style="color:var(--text-muted);font-size:.8rem">尚無回覆</p>'}
      </div>
    </div>
    ${t.status!=='resolved'&&t.status!=='closed'?`
    <div class="reply-input-area">
      <h4>新增回覆</h4>
      <textarea id="replyText" placeholder="${adm?'輸入管理員回覆...':'輸入補充說明或追問...'}"></textarea>
      <div class="reply-actions"><button class="btn btn-primary" onclick="submitReply('${t.id}')">送出回覆</button></div>
    </div>`:''}
  `;
}

function replyCard(r){
  const u=getUser(r.authorId);
  const role=u?.role||'user';
  const cls=role==='admin'?'admin-reply':role==='subadmin'?'subadmin-reply':'user-reply';
  const rcls=role==='admin'?'role-admin':role==='subadmin'?'role-subadmin':'role-user';
  const rtxt=role==='admin'?'主管理員':role==='subadmin'?'副管理員':'使用者';
  return `<div class="reply-card ${cls}">
    <div class="reply-header">
      <div class="reply-author">${u?.name||'?'}<span class="author-role ${rcls}">${rtxt}</span></div>
      <span class="reply-time">${r.time}</span>
    </div>
    <div class="reply-body">${r.body}</div>
  </div>`;
}

// ══ PANEL ══
function renderPanel(t){
  const assignee=t.assigneeId?getUser(t.assigneeId):null;
  const submitter=getUser(t.submitterId);
  document.getElementById('rightPanel').innerHTML=`
    <div class="panel-section">
      <h4>問題資訊</h4>
      <div class="info-row"><span class="info-label">票號</span><span class="info-value" style="font-family:'Space Mono',monospace">${t.id}</span></div>
      <div class="info-row"><span class="info-label">提交者</span><span class="info-value">${submitter?.name||'?'}</span></div>
      <div class="info-row"><span class="info-label">建立時間</span><span class="info-value" style="font-size:.68rem;font-family:'Space Mono',monospace">${t.created}</span></div>
      <div class="info-row"><span class="info-label">最後更新</span><span class="info-value" style="font-size:.68rem;font-family:'Space Mono',monospace">${t.updated}</span></div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h4>負責人</h4>
      ${assignee?`<div class="assignee-box">
        <div class="avatar ${assignee.role==='admin'?'avatar-a':'avatar-sa'}">${assignee.avatar}</div>
        <div class="assignee-info">${assignee.name}<small>${assignee.role==='admin'?'主管理員':'副管理員'}</small></div>
      </div>`:'<p style="color:var(--text-muted);font-size:.78rem">尚未指派</p>'}
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h4>活動紀錄</h4>
      <div class="timeline">
        ${t.timeline.map(item=>`<div class="tl-item">
          <div class="tl-dot" style="background:${item.color}"></div>
          <div><div class="tl-text">${item.text}</div><div class="tl-time">${item.time}</div></div>
        </div>`).join('')}
      </div>
    </div>
  `;
}

// ══ TICKET ACTIONS ══
function acceptTicket(id){
  const t=tickets.find(x=>x.id===id);
  t.status='inprogress'; t.assigneeId=currentUser.id; t.updated=nowStr();
  const col=currentUser.role==='admin'?'var(--accent)':'var(--accent2)';
  t.timeline.push({text:`${currentUser.name} 接受任務`,time:shortNow(),color:col});
  t.timeline.push({text:'狀態更新為 處理中',time:shortNow(),color:'var(--accent)'});
  t.replies.push({authorId:currentUser.id,time:shortNow(),body:'您好，我已接受此問題並開始處理，請稍候。'});
  addNotif(t.submitterId,'✅','問題已被接受',`${t.id}：「${t.subject.slice(0,22)}」已由 ${currentUser.name} 接手`);
  persist(t); refresh(t); showToast('✅','已接受任務');
}

function resolveTicket(id){
  const t=tickets.find(x=>x.id===id);
  t.status='resolved'; t.updated=nowStr();
  t.timeline.push({text:`${currentUser.name} 標記為已解決`,time:shortNow(),color:'var(--success)'});
  addNotif(t.submitterId,'🏁','問題已解決',`${t.id}：「${t.subject.slice(0,22)}」已標記解決`);
  persist(t); refresh(t); showToast('🏁','問題已標記解決');
}

function closeTicket(id){
  const t=tickets.find(x=>x.id===id);
  t.status='closed'; t.updated=nowStr();
  t.timeline.push({text:`${currentUser.name} 關閉問題`,time:shortNow(),color:'var(--text-muted)'});
  addNotif(t.submitterId,'🔒','問題已關閉',`${t.id}：「${t.subject.slice(0,22)}」已關閉`);
  persist(t); refresh(t); showToast('🔒','問題已關閉');
}

function deleteTicket(id){
  if(!confirm('確定要刪除此問題嗎？此操作無法復原。')) return;
  tickets = tickets.filter(x=>x.id!==id);
  saveTickets(tickets);
  selectedId=null;
  renderTicketList();
  document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">🗑️</div><p>問題已刪除</p></div>';
  document.getElementById('rightPanel').innerHTML='<div class="empty-state" style="height:100%"><div class="empty-icon">ℹ️</div><p>選擇問題以查看詳細資訊</p></div>';
  showToast('🗑️','問題已刪除');
}

function submitReply(id){
  const text=document.getElementById('replyText')?.value.trim();
  if(!text){showToast('⚠️','請輸入回覆內容');return;}
  const t=tickets.find(x=>x.id===id);
  t.replies.push({authorId:currentUser.id,time:shortNow(),body:text});
  t.updated=nowStr();
  t.timeline.push({text:`${currentUser.name} 新增回覆`,time:shortNow(),color:currentUser.role==='user'?'var(--success)':'var(--accent)'});
  const notifyId=currentUser.role==='user'?(t.assigneeId||null):t.submitterId;
  if(notifyId) addNotif(notifyId,'💬','新回覆',`${currentUser.name} 回覆了 ${t.id}`);
  // also notify all admins if user replied
  if(currentUser.role==='user'){
    accounts.filter(a=>(a.role==='admin'||a.role==='subadmin')&&a.id!==t.assigneeId).forEach(a=>{
      addNotif(a.id,'💬','新回覆',`${currentUser.name} 回覆了 ${t.id}`);
    });
  }
  persist(t); refresh(t); showToast('💬','回覆已送出');
}

function submitTicket(){
  const subject=document.getElementById('newSubject').value.trim();
  const desc=document.getElementById('newDesc').value.trim();
  if(!subject||!desc){showToast('⚠️','請填寫主旨與描述');return;}
  const id='TK-'+String(tickets.length+1).padStart(3,'0');
  const t={
    id,subject,
    category:document.getElementById('newCat').value,
    priority:document.getElementById('newPri').value,
    status:'open',assigneeId:null,submitterId:currentUser.id,
    created:nowStr(),updated:nowStr(),desc,replies:[],
    timeline:[{text:`${currentUser.name} 提交問題`,time:shortNow(),color:'var(--text-muted)'}]
  };
  tickets.unshift(t);
  accounts.filter(a=>a.role==='admin'||a.role==='subadmin').forEach(a=>{
    addNotif(a.id,'📥','新問題',`${id}：「${subject.slice(0,22)}」由 ${currentUser.name} 提交`);
  });
  saveTickets(tickets);
  closeModal('modalNewTicket');
  document.getElementById('newSubject').value='';
  document.getElementById('newDesc').value='';
  selectedId=id;
  renderTicketList();
  selectTicket(id);
  showToast('✅','問題已提交');
}

// ══ VIEWS ══
function switchView(v,el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  selectedId=null;
  if(v==='tickets'){ renderTicketList(); clearMain(); }
  else if(v==='dashboard') showDashboard();
  else if(v==='users') showUserMgmt();
}

function clearMain(){
  document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>請選擇問題</p></div>';
  document.getElementById('rightPanel').innerHTML='<div class="empty-state" style="height:100%"><div class="empty-icon">ℹ️</div><p>選擇問題以查看詳細資訊</p></div>';
}

function showDashboard(){
  const tot=tickets.length;
  const by={open:0,inprogress:0,resolved:0,closed:0};
  tickets.forEach(t=>by[t.status]++);

  tickets.forEach(t=>byPri[t.priority]++);
  document.getElementById('mainContent').innerHTML=`
    <div style="font-size:1rem;font-weight:700;margin-bottom:2px">統計看板</div>
    <div style="color:var(--text-muted);font-size:.76rem;margin-bottom:18px">所有問題概況</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      ${[{l:'總問題',v:tot,c:'var(--text)'},{l:'待處理',v:by.open,c:'var(--warn)'},{l:'處理中',v:by.inprogress,c:'var(--accent)'},{l:'已解決',v:by.resolved,c:'var(--success)'}]
        .map(s=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
          <div style="font-size:1.7rem;font-weight:700;color:${s.c};font-family:'Space Mono',monospace">${s.v}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:3px">${s.l}</div>
        </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${[
        {title:'狀態分佈',items:[
          {l:'待處理',v:by.open,c:'var(--warn)'},
          {l:'處理中',v:by.inprogress,c:'var(--accent)'},
          {l:'已解決',v:by.resolved,c:'var(--success)'},
          {l:'已關閉',v:by.closed,c:'var(--text-muted)'},
        ]},
        {title:'優先程度',items:[
          {l:'高',v:byPri.high,c:'var(--danger)'},
          {l:'中',v:byPri.mid,c:'var(--accent2)'},
          {l:'低',v:byPri.low,c:'var(--text-muted)'},
        ]},
      ].map(sec=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px">
        <div style="font-size:.65rem;font-family:'Space Mono',monospace;color:var(--text-muted);margin-bottom:12px;letter-spacing:1px">${sec.title}</div>
        ${sec.items.map(p=>{
          const pct=tot?Math.round(p.v/tot*100):0;
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
            <div style="width:50px;font-size:.72rem;color:var(--text-muted)">${p.l}</div>
            <div style="flex:1;background:var(--surface2);border-radius:3px;height:7px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${p.c};border-radius:3px;transition:width .5s"></div>
            </div>
            <div style="width:20px;text-align:right;font-size:.7rem;font-family:'Space Mono',monospace">${p.v}</div>
          </div>`;
        }).join('')}
      </div>`).join('')}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px">
      <div style="font-size:.65rem;font-family:'Space Mono',monospace;color:var(--text-muted);margin-bottom:12px;letter-spacing:1px">管理員負載</div>
      ${accounts.filter(a=>a.role==='admin'||a.role==='subadmin').map(a=>{
        const cnt=tickets.filter(t=>t.assigneeId===a.id&&t.status==='inprogress').length;
        const roleTag=a.role==='admin'?'主管理員':'副管理員';
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="avatar ${a.role==='admin'?'avatar-a':'avatar-sa'}" style="width:26px;height:26px;font-size:.7rem">${a.avatar}</div>
          <div style="flex:1;font-size:.78rem">${a.name} <span style="font-size:.65rem;color:var(--text-muted)">${roleTag}</span></div>

function openEditRole(id){
  const u=getUser(id);
  if(!u) return;
  editingRoleId=id;
  document.getElementById('editRoleUsername').value=`${u.name} (${u.id})`;
  document.getElementById('editRoleValue').value=u.role;
  openModal('modalEditRole');
}

function confirmEditRole(){
  if(!editingRoleId) return;
  const u=getUser(editingRoleId);
  if(!u) return;
  u.role=document.getElementById('editRoleValue').value;
  saveAccounts(accounts);
  closeModal('modalEditRole');
  showToast('✅',`${u.name} 的角色已更新`);
  showUserMgmt();
}

function deleteUser(id){
  if(id==='admin'){showToast('⛔','無法刪除主管理員');return;}
  accounts=accounts.filter(a=>a.id!==id);
  saveAccounts(accounts);
  showToast('🗑️','帳號已刪除');
  showUserMgmt();
}

// ══ NOTIFICATIONS ══
function addNotif(targetId,icon,title,desc){
  notifications.unshift({id:Date.now()+Math.random(),targetId,icon,title,desc,time:shortNow(),read:false});
  if(notifications.length>200) notifications=notifications.slice(0,200);
  saveNotifs(notifications);
  if(currentUser?.id===targetId) renderNotifs();
}

function renderNotifs(){
  const mine=notifications.filter(n=>n.targetId===currentUser?.id);
  const unread=mine.filter(n=>!n.read).length;
  document.getElementById('notifBadge').textContent=unread;
  document.getElementById('notifBadge').classList.toggle('show',unread>0);
  const list=document.getElementById('notifList');
  if(!list) return;
  if(!mine.length){ list.innerHTML='<div class="notif-empty">📭 沒有通知</div>'; return; }
  list.innerHTML=mine.slice(0,50).map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="readNotif(${n.id.toString().replace('.','')})">
      <div class="notif-icon">${n.icon}</div>
      <div class="notif-body">
        <div class="notif-title">${n.title}</div>
        <div class="notif-desc">${n.desc}</div>
        <div class="notif-time">${n.time}</div>
      </div>
      ${n.read?'':'<div class="notif-unread-dot"></div>'}
    </div>`).join('');
}

function readNotif(idNum){
  const n=notifications.find(x=>Math.floor(x.id)===idNum||x.id===idNum);
  if(n){ n.read=true; saveNotifs(notifications); renderNotifs(); }
}

function clearNotifs(){
  notifications.filter(n=>n.targetId===currentUser?.id).forEach(n=>n.read=true);
  saveNotifs(notifications);
  renderNotifs();
}

function toggleNotif(){
  document.getElementById('notifPanel').classList.toggle('open');
  renderNotifs();
}

// ══ MODAL ══
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});
document.addEventListener('click',e=>{
  const panel=document.getElementById('notifPanel');
  const btn=document.getElementById('notifBtn');
  if(panel&&btn&&!panel.contains(e.target)&&!btn.contains(e.target)) panel.classList.remove('open');
});

// ══ HELPERS ══
function priLabel(p){ return p==='high'?'🔴 高':p==='mid'?'🟡 中':'⚪ 低'; }
function statusLabel(s){ return {open:'待處理',inprogress:'處理中',resolved:'已解決',closed:'已關閉'}[s]||s; }
function statusBadge(s){ return {open:'badge-open',inprogress:'badge-inprogress',resolved:'badge-resolved',closed:'badge-closed'}[s]||''; }
function nowStr(){ const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`; }
function shortNow(){ const d=new Date(); return `${p2(d.getMonth()+1)}/${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`; }
function p2(n){ return String(n).padStart(2,'0'); }
function persist(t){ saveTickets(tickets); }
function refresh(t){ renderTicketList(); if(selectedId===t.id){ renderDetail(t); renderPanel(t); } }

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  selectedId=null; renderTicketList(); clearMain();
}

function showToast(icon,msg){
  document.getElementById('toastIcon').textContent=icon;
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ══ DUTY OFFICER — SCHEDULE SYSTEM ══
const WEEKDAYS = ['週日','週一','週二','週三','週四','週五','週六'];
const WORK_DAYS = [1,2,3,4,5]; // Mon–Fri indices
const WORK_LABELS = ['週一','週二','週三','週四','週五'];

// schedule shape: { 1:{name:'',photo:null}, 2:{...}, 3:{...}, 4:{...}, 5:{...} }
function loadSchedule(){
  try{ const r=localStorage.getItem('hd_duty_schedule'); if(r) return JSON.parse(r); }catch(e){}
  return {1:{name:'',photo:null},2:{name:'',photo:null},3:{name:'',photo:null},4:{name:'',photo:null},5:{name:'',photo:null}};
}
function saveSchedule_data(s){ localStorage.setItem('hd_duty_schedule',JSON.stringify(s)); }

// pending edits in modal (keyed by weekday index)
let scheduleDraft = {};
let uploadingDay = null; // which day's photo is being uploaded

function initDuty(){
  const d = new Date();
  document.getElementById('dutyDateStr').textContent =
    `${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())} ${WEEKDAYS[d.getDay()]}`;
  renderDutyToday();
  renderWeekPreview();
}

function renderDutyToday(){
  const d = new Date();
  const dow = d.getDay(); // 0=Sun,1=Mon,...
  const schedule = loadSchedule();
  const slot = schedule[dow];

  const photoEl = document.getElementById('dutyPhoto');
  const placeholder = document.getElementById('dutyPlaceholder');
  const nameDisp = document.getElementById('dutyNameDisplay');
  const photoWrap = document.getElementById('dutyPhotoWrap');

  if(slot && slot.name){
    nameDisp.textContent = slot.name;
    nameDisp.classList.remove('placeholder');
  } else {
    nameDisp.textContent = WORK_DAYS.includes(dow) ? '尚未設定' : '今日休息';
    nameDisp.classList.add('placeholder');
  }

  if(slot && slot.photo){
    photoEl.src = slot.photo;
    photoEl.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    photoEl.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = WORK_DAYS.includes(dow)
      ? '<span>👤</span><div>尚未設定<br>今日值班</div>'
      : '<span>🌙</span><div>今日休息</div>';
  }
}

function renderWeekPreview(){
  const schedule = loadSchedule();
  const todayDow = new Date().getDay();
  const container = document.getElementById('dutyWeekPreview');

  container.innerHTML = WORK_DAYS.map(dow => {
    const slot = schedule[dow] || {name:'',photo:null};
    const isToday = dow === todayDow;
    const avatarHtml = slot.photo
      ? `<div class="duty-week-avatar"><img src="${slot.photo}" alt=""></div>`
      : `<div class="duty-week-avatar" style="font-size:.75rem">👤</div>`;
    const nameHtml = slot.name
      ? `<span class="duty-week-name">${slot.name}</span>`
      : `<span class="duty-week-name empty">未設定</span>`;
    return `<div class="duty-week-row ${isToday?'today':''}">
      <span class="duty-week-day">${WORK_LABELS[WORK_DAYS.indexOf(dow)]}</span>
      ${avatarHtml}
      ${nameHtml}
    </div>`;
  }).join('');
}

// ── Schedule Modal ──
function openScheduleModal(){
  const schedule = loadSchedule();
  // deep clone into draft
  scheduleDraft = JSON.parse(JSON.stringify(schedule));
  renderScheduleRows();
  openModal('modalDutySchedule');
}

function renderScheduleRows(){
  const container = document.getElementById('scheduleRows');
  container.innerHTML = WORK_DAYS.map(dow => {
    const slot = scheduleDraft[dow] || {name:'',photo:null};
    const label = WORK_LABELS[WORK_DAYS.indexOf(dow)];
    const photoHtml = slot.photo
      ? `<img src="${slot.photo}" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%">`
      : '📷';
    return `<div class="schedule-row" id="srow-${dow}">
      <span class="schedule-day-label">${label}</span>
      <div class="schedule-photo-btn" onclick="triggerSchedulePhoto(${dow})" title="點擊上傳照片" style="position:relative">
        ${photoHtml}
      </div>
      <input class="schedule-name-input" type="text" placeholder="輸入姓名..."
        value="${slot.name||''}"
        oninput="scheduleDraft[${dow}].name=this.value">
      <button class="schedule-clear-btn" onclick="clearScheduleRow(${dow})">✕</button>
    </div>`;
  }).join('');
}

function triggerSchedulePhoto(dow){
  uploadingDay = dow;
  document.getElementById('dutyFileInput').click();
}

function handleSchedulePhotoUpload(e){
  const file = e.target.files[0];
  if(!file || uploadingDay === null) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const src = ev.target.result;
    if(!scheduleDraft[uploadingDay]) scheduleDraft[uploadingDay]={name:'',photo:null};
    scheduleDraft[uploadingDay].photo = src;
    renderScheduleRows();
    showToast('📷', `${WORK_LABELS[WORK_DAYS.indexOf(uploadingDay)]} 照片已上傳`);
    uploadingDay = null;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function clearScheduleRow(dow){
  scheduleDraft[dow] = {name:'', photo:null};
  renderScheduleRows();
}

function saveSchedule(){
  // sync any name inputs directly (in case oninput didn't fire)
  WORK_DAYS.forEach(dow => {
    const inp = document.querySelector(`#srow-${dow} .schedule-name-input`);
    if(inp) scheduleDraft[dow].name = inp.value.trim();
  });
  saveSchedule_data(scheduleDraft);
  closeModal('modalDutySchedule');
  renderDutyToday();
  renderWeekPreview();
  showToast('✅', '排班已儲存');
}
